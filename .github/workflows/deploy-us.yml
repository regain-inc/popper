
name: Deploy to US (AWS)

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "907356469674"
  ECR_REGISTRY: 907356469674.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: regain-production

jobs:
  build-push:
    name: Build & Push (${{ matrix.service }})
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04-arm
    environment: production
    strategy:
      matrix:
        include:
          - service: popper-server
            ecr_repo: regain/popper-server
            dockerfile: infra/docker/Dockerfile.server
          - service: popper-worker
            ecr_repo: regain/popper-worker
            dockerfile: infra/docker/Dockerfile.queue
          - service: popper-web
            ecr_repo: regain/popper-web
            dockerfile: infra/docker/Dockerfile.web
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::907356469674:role/regain-deploy-popper
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ matrix.ecr_repo }}:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ECS
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-us-production-popper
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::907356469674:role/regain-deploy-popper
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy popper-server
        run: |
          .github/scripts/ecs-deploy.sh \
            regain-popperserver popperserver \
            "${ECR_REGISTRY}/regain/popper-server:${{ github.event.workflow_run.head_sha }}" \
            regain-popperserver "${ECS_CLUSTER}"

      - name: Deploy popper-worker
        run: |
          .github/scripts/ecs-deploy.sh \
            regain-popperworker popperworker \
            "${ECR_REGISTRY}/regain/popper-worker:${{ github.event.workflow_run.head_sha }}" \
            regain-popperworker "${ECS_CLUSTER}"

      - name: Deploy popper-web
        run: |
          .github/scripts/ecs-deploy.sh \
            regain-popperweb popperweb \
            "${ECR_REGISTRY}/regain/popper-web:${{ github.event.workflow_run.head_sha }}" \
            regain-popperweb "${ECS_CLUSTER}"

      - name: Wait for stability
        timeout-minutes: 15
        run: |
          echo "Waiting for services to stabilize..."
          for attempt in $(seq 1 60); do
            ALL_STABLE=true
            for service in regain-popperserver regain-popperworker regain-popperweb; do
              DEPLOYMENTS=$(aws ecs describe-services \
                --cluster "${ECS_CLUSTER}" --services "${service}" \
                --query 'services[0].deployments | length(@)' --output text)
              PRIMARY_RUNNING=$(aws ecs describe-services \
                --cluster "${ECS_CLUSTER}" --services "${service}" \
                --query 'services[0].deployments[?status==`PRIMARY`] | [0].runningCount' --output text)
              PRIMARY_DESIRED=$(aws ecs describe-services \
                --cluster "${ECS_CLUSTER}" --services "${service}" \
                --query 'services[0].deployments[?status==`PRIMARY`] | [0].desiredCount' --output text)
              if [ "${DEPLOYMENTS}" != "1" ] || [ "${PRIMARY_RUNNING}" != "${PRIMARY_DESIRED}" ]; then
                ALL_STABLE=false
              fi
            done
            if [ "${ALL_STABLE}" = true ]; then
              echo "All services stable"
              exit 0
            fi
            echo "  Attempt ${attempt}/60 — waiting 15s..."
            sleep 15
          done
          echo "::warning::Services did not fully stabilize within 15 minutes"
