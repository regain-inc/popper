
name: Deploy to US (AWS)

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "607336804375"
  ECR_REGISTRY: 607336804375.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: regain-production

jobs:
  build-push:
    name: Build & Push (${{ matrix.service }})
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        include:
          - service: popper-server
            ecr_repo: regain/popper-server
            dockerfile: apps/server/Dockerfile
          - service: popper-worker
            ecr_repo: regain/popper-worker
            dockerfile: apps/worker/Dockerfile
          - service: popper-web
            ecr_repo: regain/popper-web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::607336804375:role/regain-deploy-popper
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ matrix.ecr_repo }}:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ECS
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-us-production-popper
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::607336804375:role/regain-deploy-popper
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy popper-server
        run: |
          .github/scripts/ecs-deploy.sh \
            regain-popperserver popperserver \
            "${ECR_REGISTRY}/regain/popper-server:${{ github.event.workflow_run.head_sha }}" \
            regain-popperserver "${ECS_CLUSTER}"

      - name: Deploy popper-worker
        run: |
          .github/scripts/ecs-deploy.sh \
            regain-popperworker popperworker \
            "${ECR_REGISTRY}/regain/popper-worker:${{ github.event.workflow_run.head_sha }}" \
            regain-popperworker "${ECS_CLUSTER}"

      - name: Deploy popper-web
        run: |
          .github/scripts/ecs-deploy.sh \
            regain-popperweb popperweb \
            "${ECR_REGISTRY}/regain/popper-web:${{ github.event.workflow_run.head_sha }}" \
            regain-popperweb "${ECS_CLUSTER}"

      - name: Wait for stability
        run: |
          echo "Waiting for services to stabilize..."
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services regain-popperserver regain-popperworker regain-popperweb
          echo "All services stable"
