  # ═══════════════════════════════════════════════════════════════════════════
  # CROSS-DOMAIN CONFLICTS (Priority 300-399)
  # ═══════════════════════════════════════════════════════════════════════════

  - rule_id: conflict_count_too_high
    description: Too many cross-domain conflicts
    priority: 360
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §7 — multi-domain composition: conflict_count_exceeds"
      calibration_note: "Threshold of 5 conflicts is an engineering heuristic. Rationale: >5 simultaneous cross-domain conflicts indicate systemic disagreement rather than isolated edge cases, warranting human review of the overall clinical picture."
      evidence_grade: policy
      jurisdiction: global
      clinical_domain: general
      approved_by: "Popper Dev Team"
      effective_date: "2026-01-26"
      review_interval_days: 365
      review_due: "2027-01-26"
    when:
      kind: conflict_count_exceeds
      threshold: 5
    then:
      decision: ROUTE_TO_CLINICIAN
      reason_codes:
        - policy_violation
        - needs_human_review
      explanation: Too many cross-domain conflicts detected. Clinician review required.

  - rule_id: conflict_escalated
    description: Cross-domain conflict escalated
    priority: 350
