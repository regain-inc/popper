# Popper Core Safety Pack
# Safety DSL v1 - Deterministic Policy Engine
#
# This is the core safety pack for Popper supervision.
# It implements minimum required rules per 03-popper-safety-dsl.md §5.
# All rules carry provenance for audit traceability (v2.1).

policy_id: popper-core-safety
policy_version: 2.0.0
pack_type: core

metadata:
  description: Core safety rules — schema, staleness, safe-mode, evidence quality, uncertainty, hallucination, conflicts, acuity, defaults
  owner: Popper Dev Team
  jurisdiction: global
  created_at: "2026-01-26"
  approved_at: "2026-03-19"
  review_interval_days: 365
  sources:
    - kind: policy
      citation: "03-popper-safety-dsl.md §5 - Minimum required rules"

# Staleness configuration (Popper is AUTHORITATIVE)
staleness:
  thresholds:
    wellness_hours: 24
    clinical_hours: 4
  behavior:
    low_risk_stale: REQUEST_MORE_INFO
    high_risk_stale: ROUTE_TO_CLINICIAN

rules:
  # ═══════════════════════════════════════════════════════════════════════════
  # CRITICAL: Schema and Security (Priority 1000+)
  # ═══════════════════════════════════════════════════════════════════════════

  - rule_id: schema_invalid
    description: Invalid schema - cannot process safely
    priority: 1200
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §4 step 1 — schema validation gate"
      evidence_grade: policy
      jurisdiction: global
      clinical_domain: general
      approved_by: "Popper Dev Team"
      effective_date: "2026-01-26"
      review_interval_days: 365
      review_due: "2027-01-26"
    when:
      kind: schema_invalid
    then:
      decision: HARD_STOP
      reason_codes:
        - schema_invalid
      explanation: Request failed schema validation. Cannot process safely.

  - rule_id: snapshot_missing
    description: No snapshot provided - cannot proceed safely
    priority: 1100
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §5 bullet 4 — snapshot_missing → HARD_STOP"
      evidence_grade: policy
      jurisdiction: global
      clinical_domain: general
      approved_by: "Popper Dev Team"
      effective_date: "2026-01-26"
      review_interval_days: 365
      review_due: "2027-01-26"
    when:
      kind: snapshot_missing
    then:
      decision: HARD_STOP
      reason_codes:
        - schema_invalid
        - data_quality_warning
      explanation: No health state snapshot provided. Cannot evaluate safety without patient data.

  # ═══════════════════════════════════════════════════════════════════════════
  # MODE VIOLATION RULES (Priority 1050)
  # ═══════════════════════════════════════════════════════════════════════════

  - rule_id: wellness_mode_medication_violation
    description: Medication proposals not allowed in wellness mode
    priority: 1050
    when:
      kind: all_of
      conditions:
        - kind: mode_is
          mode: wellness
        - kind: proposal_kind_in
          kinds:
            - MEDICATION_ORDER_PROPOSAL
    then:
      decision: HARD_STOP
      reason_codes:
        - policy_violation
      explanation: Medication proposals are not permitted in wellness mode.
    provenance:
      source_type: governance_requirement
      source_layer: 5
      citation: "Popper Safety DSL v1, §4 step 2 — safe-mode override: never APPROVE medication in wellness"
      evidence_grade: policy
      jurisdiction: US
      clinical_domain: safety
      approved_by: "Popper Dev Team"
      effective_date: "2026-01-25"
      review_interval_days: 365
      review_due: "2027-01-25"

  # ═══════════════════════════════════════════════════════════════════════════
  # STALENESS RULES (Priority 900-999)
  # Popper is AUTHORITATIVE - does NOT trust Brain's validation
  # ═══════════════════════════════════════════════════════════════════════════

  - rule_id: data_quality_warning_high_risk
    description: Stale snapshot for high-risk proposals
    priority: 950
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §5.1 — staleness rules: high-risk stale → ROUTE_TO_CLINICIAN"
      calibration_note: "Staleness thresholds (wellness: 24h, clinical: 4h) are engineering defaults from §3. NEEDS HUMAN REVIEW: clinical team should confirm 4h clinical threshold against institutional practice."
      evidence_grade: policy
      jurisdiction: global
      clinical_domain: general
      approved_by: "Popper Dev Team"
      effective_date: "2026-01-26"
      review_interval_days: 365
      review_due: "2027-01-26"
    when:
      kind: all_of
      conditions:
        - kind: snapshot_stale
        - kind: proposal_kind_in
          kinds:
            - MEDICATION_ORDER_PROPOSAL
            - TRIAGE_ROUTE
    then:
      decision: ROUTE_TO_CLINICIAN
      reason_codes:
        - data_quality_warning
        - risk_too_high
      explanation: Health state snapshot is stale. High-risk actions require fresh data.

  - rule_id: data_quality_warning_default
    description: Stale snapshot - request fresh data
    priority: 900
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §5.1 — staleness rules: low-risk stale → REQUEST_MORE_INFO"
      calibration_note: "See data_quality_warning_high_risk calibration_note for threshold rationale."
      evidence_grade: policy
      jurisdiction: global
      clinical_domain: general
      approved_by: "Popper Dev Team"
      effective_date: "2026-01-26"
      review_interval_days: 365
      review_due: "2027-01-26"
    when:
      kind: snapshot_stale
    then:
      decision: REQUEST_MORE_INFO
      reason_codes:
        - data_quality_warning
      explanation: Health state snapshot is outdated. Please refresh patient data.

  # ═══════════════════════════════════════════════════════════════════════════
  # SAFE MODE (Priority 800-899)
  # ═══════════════════════════════════════════════════════════════════════════

  - rule_id: safe_mode_medication
    description: Safe mode enabled - block medication proposals
    priority: 850
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §4 step 2 — safe-mode: never APPROVE medication proposals"
      evidence_grade: policy
      jurisdiction: global
      clinical_domain: general
      approved_by: "Popper Dev Team"
      effective_date: "2026-01-26"
      review_interval_days: 365
      review_due: "2027-01-26"
    when:
      kind: all_of
      conditions:
        - kind: safe_mode_enabled
        - kind: proposal_kind_in
          kinds:
            - MEDICATION_ORDER_PROPOSAL
    then:
      decision: HARD_STOP
      reason_codes:
        - policy_violation
        - needs_human_review
      explanation: Safe mode is enabled. Medication proposals are blocked.

  - rule_id: safe_mode_high_risk
    description: Safe mode enabled - block high-risk proposals
    priority: 800
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §4 step 2 — safe-mode: ROUTE non-trivial proposals"
      evidence_grade: policy
      jurisdiction: global
      clinical_domain: general
      approved_by: "Popper Dev Team"
      effective_date: "2026-01-26"
      review_interval_days: 365
      review_due: "2027-01-26"
    when:
      kind: all_of
      conditions:
        - kind: safe_mode_enabled
        - kind: proposal_kind_in
          kinds:
            - TRIAGE_ROUTE
            - BEHAVIORAL_INTERVENTION_PROPOSAL
    then:
      decision: HARD_STOP
      reason_codes:
        - policy_violation
        - needs_human_review
      explanation: Safe mode is enabled. High-risk proposals are blocked.

  # ═══════════════════════════════════════════════════════════════════════════
  # INPUT RISK FLAGS (Priority 700-799)
  # ═══════════════════════════════════════════════════════════════════════════

  - rule_id: prompt_injection_suspected
    description: Possible prompt injection detected
    priority: 750
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §5 bullet 4 — input risk flags: HARD_STOP for suspected malicious activity"
      evidence_grade: policy
      jurisdiction: global
      clinical_domain: general
      approved_by: "Popper Dev Team"
      effective_date: "2026-01-26"
      review_interval_days: 365
      review_due: "2027-01-26"
    when:
      kind: input_risk_flag_in
      flags:
        - prompt_injection_suspected
        - jailbreak_attempt
    then:
      decision: HARD_STOP
      reason_codes:
        - policy_violation
        - risk_too_high
      explanation: Possible prompt injection or jailbreak attempt detected.

  - rule_id: input_risk_flags
    description: Input risk flags present
    priority: 700
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §5 bullet 4 — input risk flags → ROUTE_TO_CLINICIAN"
      evidence_grade: policy
      jurisdiction: global
      clinical_domain: general
      approved_by: "Popper Dev Team"
      effective_date: "2026-01-26"
      review_interval_days: 365
      review_due: "2027-01-26"
    when:
      kind: input_risk_flag_in
      flags:
        - unusual_request_pattern
        - high_frequency_requests
    then:
      decision: ROUTE_TO_CLINICIAN
      reason_codes:
        - policy_violation
      explanation: Input risk flags detected. Routing to clinician for review.

  # ═══════════════════════════════════════════════════════════════════════════
  # EVIDENCE QUALITY (Priority 600-699)
  # ═══════════════════════════════════════════════════════════════════════════

  - rule_id: medication_missing_evidence
    description: Medication proposal missing evidence references
    priority: 650
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §5 bullet 6 — medication missing evidence_refs → ROUTE_TO_CLINICIAN"
      evidence_grade: policy
      jurisdiction: global
      clinical_domain: general
      approved_by: "Popper Dev Team"
      effective_date: "2026-01-26"
      review_interval_days: 365
      review_due: "2027-01-26"
    when:
      kind: proposal_missing_field
      proposal_kinds:
        - MEDICATION_ORDER_PROPOSAL
      field_path: evidence_refs
    then:
      decision: ROUTE_TO_CLINICIAN
      reason_codes:
        - insufficient_evidence
      explanation: Medication proposal is missing evidence references.

  - rule_id: medication_missing_protocol
    description: Medication proposal missing clinician protocol reference
    priority: 640
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §5 bullet 5 — medication missing clinician_protocol_ref → ROUTE_TO_CLINICIAN"
      evidence_grade: policy
      jurisdiction: global
      clinical_domain: general
      approved_by: "Popper Dev Team"
      effective_date: "2026-01-26"
      review_interval_days: 365
      review_due: "2027-01-26"
    when:
      kind: proposal_missing_field
      proposal_kinds:
        - MEDICATION_ORDER_PROPOSAL
      field_path: clinician_protocol_ref
    then:
      decision: ROUTE_TO_CLINICIAN
      reason_codes:
        - insufficient_evidence
        - needs_human_review
      explanation: Medication proposal is missing clinician protocol reference.

  - rule_id: low_htv_score_medication
    description: Low HTV score for medication proposals
    priority: 620
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §8 — epistemological quality: htv_score_below for high-risk proposals"
      calibration_note: "HTV 0.6 threshold for medications is an engineering default. Rationale: medication orders carry irreversibility risk; 0.6 represents moderate epistemic confidence below which clinician review is warranted. NEEDS HUMAN REVIEW: clinical team should validate this threshold against observed HTV score distributions in production."
      evidence_grade: policy
      jurisdiction: global
      clinical_domain: general
      approved_by: "Popper Dev Team"
      effective_date: "2026-01-26"
      review_interval_days: 365
      review_due: "2027-01-26"
    when:
      kind: htv_score_below
      threshold: 0.6
      proposal_kinds:
        - MEDICATION_ORDER_PROPOSAL
    then:
      decision: ROUTE_TO_CLINICIAN
      reason_codes:
        - low_htv_score
        - needs_human_review
      explanation: Medication proposal has low hard-to-vary score. Requires clinician review.

  - rule_id: low_htv_score_default
    description: Low HTV score for any proposal
    priority: 600
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §8 — epistemological quality: htv_score_below for all proposals"
      calibration_note: "HTV 0.4 threshold is the global minimum. Below this, even low-risk proposals lack sufficient epistemic grounding. NEEDS HUMAN REVIEW: validate against observed distributions."
      evidence_grade: policy
      jurisdiction: global
      clinical_domain: general
      approved_by: "Popper Dev Team"
      effective_date: "2026-01-26"
      review_interval_days: 365
      review_due: "2027-01-26"
    when:
      kind: htv_score_below
      threshold: 0.4
    then:
      decision: REQUEST_MORE_INFO
      reason_codes:
        - low_htv_score
      explanation: Proposal has low hard-to-vary score. Additional information needed.

  - rule_id: weak_evidence_grade
    description: Weak evidence grade for clinical proposals
    priority: 610
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §8 — epistemological quality: evidence_grade_below for clinical proposals"
      calibration_note: "Threshold set at case_control (Oxford CEBM Level 3b). Medication and triage proposals grounded only in case reports/expert opinion are routed for clinician review. Aligns with standard evidence hierarchies (Oxford CEBM 2011, GRADE framework)."
      evidence_grade: policy
      jurisdiction: global
      clinical_domain: general
      approved_by: "Popper Dev Team"
      effective_date: "2026-01-26"
      review_interval_days: 365
      review_due: "2027-01-26"
    when:
      kind: evidence_grade_below
      threshold: case_control
      proposal_kinds:
        - MEDICATION_ORDER_PROPOSAL
        - TRIAGE_ROUTE
    then:
      decision: ROUTE_TO_CLINICIAN
      reason_codes:
        - weak_evidence_grade
        - needs_human_review
      explanation: Clinical proposal has weak evidence grade. Requires clinician review.

  # ═══════════════════════════════════════════════════════════════════════════
  # UNCERTAINTY (Priority 500-599)
  # ═══════════════════════════════════════════════════════════════════════════

  - rule_id: high_uncertainty_medication
    description: High uncertainty for medication proposals
    priority: 550
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §5 bullet 7 — high uncertainty + high-risk proposals → ROUTE_TO_CLINICIAN"
      evidence_grade: policy
      jurisdiction: global
      clinical_domain: general
      approved_by: "Popper Dev Team"
      effective_date: "2026-01-26"
      review_interval_days: 365
      review_due: "2027-01-26"
    when:
      kind: all_of
      conditions:
        - kind: uncertainty_at_least
          level: high
        - kind: proposal_kind_in
          kinds:
            - MEDICATION_ORDER_PROPOSAL
    then:
      decision: ROUTE_TO_CLINICIAN
      reason_codes:
        - high_uncertainty
        - risk_too_high
      explanation: High uncertainty detected for medication proposal.

  - rule_id: high_uncertainty_default
    description: High uncertainty for any proposal
    priority: 500
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §5 bullet 7 — high uncertainty → REQUEST_MORE_INFO"
      evidence_grade: policy
      jurisdiction: global
      clinical_domain: general
      approved_by: "Popper Dev Team"
      effective_date: "2026-01-26"
      review_interval_days: 365
      review_due: "2027-01-26"
    when:
      kind: uncertainty_at_least
      level: high
    then:
      decision: REQUEST_MORE_INFO
      reason_codes:
        - high_uncertainty
      explanation: High uncertainty detected. Additional information needed.

