      review_interval_days: 365
      review_due: "2027-01-26"
    when:
      kind: conflict_escalated
    then:
      decision: ROUTE_TO_CLINICIAN
      reason_codes:
        - policy_violation
        - needs_human_review
      explanation: Cross-domain conflict was escalated. Clinician review required.

  - rule_id: conflict_missing_evidence
    description: Cross-domain conflict missing evidence
    priority: 340
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §7 — multi-domain composition: conflict_missing_evidence"
      evidence_grade: policy
      jurisdiction: global
      clinical_domain: general
