    priority: 400
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §8 — idk_triggered → ROUTE_TO_CLINICIAN"
      evidence_grade: policy
      jurisdiction: global
