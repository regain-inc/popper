  # ═══════════════════════════════════════════════════════════════════════════
  # ACUITY & INTERVENTION RISK (Priority 200-299)
  # Composite risk scoring — evaluated after individual-factor rules above.
  # These catch cases where multiple moderate factors combine into high risk.
  # @see SAL-1018 (acuity scoring), SAL-1020 (intervention risk calculator)
  # ═══════════════════════════════════════════════════════════════════════════

  - rule_id: critical_acuity_medication
    description: Critical patient acuity with medication proposal - hard stop
    priority: 290
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §5 — acuity-risk composite: critical acuity + medication → HARD_STOP"
      calibration_note: "Acuity levels (low/moderate/high/critical) map to standard clinical acuity scales. Critical acuity with medication changes requires mandatory clinician authorization — standard of care for critically ill patients."
      evidence_grade: policy
      jurisdiction: global
      clinical_domain: general
      approved_by: "Popper Dev Team"
      effective_date: "2026-01-26"
      review_interval_days: 365
      review_due: "2027-01-26"
    when:
      kind: all_of
      conditions:
        - kind: acuity_at_least
          level: critical
        - kind: proposal_kind_in
          kinds:
            - MEDICATION_ORDER_PROPOSAL
    then:
      decision: HARD_STOP
      reason_codes:
        - risk_too_high
        - needs_human_review
      explanation: Critical patient acuity detected with medication proposal. Cannot proceed without clinician.

  - rule_id: critical_acuity_any
    description: Critical patient acuity - route all proposals to clinician
    priority: 285
    provenance:
      source_type: internal_policy
      source_layer: 1
      citation: "Popper Safety DSL v1, §5 — acuity-risk composite: critical acuity → ROUTE_TO_CLINICIAN"
      evidence_grade: policy
