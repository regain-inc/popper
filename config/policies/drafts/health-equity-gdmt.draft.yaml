#
# This file is quarantined from runtime. It uses unsupported:
#   - pack_type: overlay (valid types: core | domain | site | modality)
#   - APPROVED_WITH_NOTE, GOVERNANCE_REVIEW (valid decisions: APPROVED | HARD_STOP | ROUTE_TO_CLINICIAN | REQUEST_MORE_INFO)
#   - equity_flag, cost_consideration (not in REASON_CODES)
#   - expert_commentary, scientific_statement (not valid source kinds)
#   - snapshot_field_equals, snapshot_field_in, snapshot_field_present, aggregate_threshold (not in DSL)
#   - Missing review_due on provenance blocks
#
# The aggregate_threshold rule is architecturally wrong for request-time
# supervision. Move to batch analytics.
#
# The SDoH rule should trigger ACCESS SUPPORT (prior auth, copay assistance),
