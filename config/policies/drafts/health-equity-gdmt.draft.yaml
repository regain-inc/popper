#
# Redesign approach:
#   1. Hydralazine/ISDN: Keep as clinician-facing adjunct, but require
#      confirmed optimal-GDMT state + explicit self-identification + NYHA III-IV
#   2. SDoH: Trigger access-support workflow, NOT generic ACEi fallback
#   3. Demographic monitoring: Move to batch analytics over ClinicianFeedbackEvent
