# US Production overrides (AWS)
replicaCount: 3

resources:
  requests:
    cpu: 1000m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilization: 70
  targetMemoryUtilization: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

queueWorker:
  replicaCount: 2
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  hosts:
    - host: popper.regain.ai
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: popper-api-us-tls
      hosts:
        - popper.regain.ai
  certManager:
    enabled: true
    clusterIssuer: "letsencrypt-prod"

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::role/popper-prod-eso"

externalSecrets:
  enabled: true
  environment: "prod"
  provider: "aws"
  refreshInterval: "1h"
  secretStoreRef:
    name: "aws-secretsmanager-backend"
    kind: "ClusterSecretStore"
  secretStore:
    create: true
  aws:
    region: "us-east-1"
    service: "SecretsManager"
