{{- if .Values.queueWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "popper.fullname" . }}-queue
  labels:
    {{- include "popper.labels" . | nindent 4 }}
    app.kubernetes.io/component: queue
spec:
  replicas: {{ .Values.queueWorker.replicaCount }}
  selector:
    matchLabels:
      {{- include "popper.queueSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.externalSecrets.enabled }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- else }}
        secret.reloader.stakater.com/reload: {{ include "popper.fullname" . }}-secrets
        {{- end }}
      labels:
        {{- include "popper.queueSelectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "popper.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: {{ .Chart.Name }}-queue
          image: "{{ .Values.queueWorker.image.repository }}:{{ .Values.queueWorker.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.queueWorker.image.pullPolicy }}
          resources:
            {{- toYaml .Values.queueWorker.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "popper.fullname" . }}-config
            - secretRef:
                name: {{ include "popper.fullname" . }}-secrets
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
