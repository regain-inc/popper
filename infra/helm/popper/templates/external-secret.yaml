{{- if .Values.externalSecrets.enabled -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "popper.fullname" . }}-secrets
  labels:
    {{- include "popper.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "popper.fullname" . }}-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # Core secrets
    - secretKey: DATABASE_URL
      remoteRef:
        key: secret/data/popper/{{ .Values.externalSecrets.environment }}/core
        property: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: secret/data/popper/{{ .Values.externalSecrets.environment }}/core
        property: REDIS_URL
    - secretKey: POPPER_ADMIN_API_KEY
      remoteRef:
        key: secret/data/popper/{{ .Values.externalSecrets.environment }}/core
        property: POPPER_ADMIN_API_KEY
    # S3/MinIO secrets
    {{- range $key := list "S3_ENDPOINT" "S3_ACCESS_KEY" "S3_SECRET_KEY" }}
    - secretKey: {{ $key }}
      remoteRef:
        key: secret/data/popper/{{ $.Values.externalSecrets.environment }}/s3
        property: {{ $key }}
    {{- end }}
    # Observability secrets
    {{- range $key := list "OTEL_EXPORTER_OTLP_ENDPOINT" }}
    - secretKey: {{ $key }}
      remoteRef:
        key: secret/data/popper/{{ $.Values.externalSecrets.environment }}/observability
        property: {{ $key }}
    {{- end }}
{{- end }}
