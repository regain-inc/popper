{{- if not .Values.externalSecrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "popper.fullname" . }}-secrets
  labels:
    {{- include "popper.labels" . | nindent 4 }}
type: Opaque
{{- if .Values.secrets }}
data:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}
